<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#grad)"/>
  
  <!-- Letter P - made of points -->
  <circle cx="32" cy="30" r="4" fill="white"/>
  <circle cx="32" cy="42" r="4" fill="white"/>
  <circle cx="32" cy="54" r="4" fill="white"/>
  <circle cx="32" cy="66" r="4" fill="white"/>
  <circle cx="32" cy="78" r="4" fill="white"/>
  <circle cx="32" cy="90" r="4" fill="white"/>
  <circle cx="44" cy="30" r="4" fill="white"/>
  <circle cx="56" cy="36" r="4" fill="white"/>
  <circle cx="56" cy="48" r="4" fill="white"/>
  <circle cx="44" cy="54" r="4" fill="white"/>
  
  <!-- Letter I - made of points -->
  <circle cx="76" cy="30" r="4" fill="white" opacity="0.9"/>
  <circle cx="76" cy="44" r="4" fill="white" opacity="0.9"/>
  <circle cx="76" cy="58" r="4" fill="white" opacity="0.9"/>
  <circle cx="76" cy="72" r="4" fill="white" opacity="0.9"/>
  <circle cx="76" cy="86" r="4" fill="white" opacity="0.9"/>
  
  <!-- Decorative connection lines (neural network style) -->
  <line x1="56" y1="48" x2="76" y2="44" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="44" y1="54" x2="76" y2="58" stroke="white" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Scattered small dots (point cloud effect) -->
  <circle cx="90" cy="40" r="2" fill="white" opacity="0.5"/>
  <circle cx="95" cy="55" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="88" cy="70" r="2" fill="white" opacity="0.5"/>
  <circle cx="98" cy="80" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="92" cy="90" r="2" fill="white" opacity="0.4"/>
</svg>
